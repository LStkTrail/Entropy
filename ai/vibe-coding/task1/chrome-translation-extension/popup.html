<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 沉浸式翻译</title>
    <link rel="stylesheet" href="popup.css">
</head>
<body>
    <div class="container">
        <h2>AI 沉浸式翻译</h2>
        
        <div class="form-group">
            <label for="apiEndpoint">API 地址</label>
            <input type="text" id="apiEndpoint" placeholder="例如: https://api.openai.com/v1" value="https://api.openai.com/v1">
        </div>

        <div class="form-group">
            <label for="apiKey">API 密钥</label>
            <input type="password" id="apiKey" placeholder="请输入您的 API Key">
        </div>

        <div class="form-group">
            <label for="targetLang">目标语言</label>
            <input type="text" id="targetLang" placeholder="例如: 中文" value="中文">
        </div>

        <div class="form-group">
            <label for="modelName">模型名称</label>
            <input type="text" id="modelName" placeholder="例如: gpt-4o-mini" value="gpt-4o-mini">
        </div>

        <button id="translateBtn">翻译当前页面</button>

        <div id="status" class="status"></div>
    </div>
    <script src="popup.js"></script>
</body>
</html>
